name: Sync SFA Bundles

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform (Android / iOS / StandaloneWindows)"
        required: false
        default: "Android"
      force:
        description: "Force re-download even if version unchanged (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      SFA_PLATFORM: ${{ github.event.inputs.platform || 'Android' }}
      FORCE_SYNC:   ${{ github.event.inputs.force    || 'false' }}
      OUT_DIR:      bundles
      WORKERS:      16

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify Python
        run: python3 --version

      - name: Check latest game version
        id: version_check
        run: |
          python3 - << 'EOF'
          import json, random, urllib.request, os

          rand = random.randint(10000, 99999)
          url = (
            f"https://sfalb.nekki.com/balance"
            f"?w=PROD-AS&fv=1.9.80.20.26181-prod&rand={rand}&p=Android&client_version=1.9.81"
          )
          req = urllib.request.Request(url, headers={"User-Agent": "UnityPlayer/2022.3"})
          with urllib.request.urlopen(req, timeout=15) as r:
              bal = json.loads(r.read())

          version = bal["version"]["cur"]
          print(f"Latest version: {version}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")

          import pathlib
          latest_file = pathlib.Path("bundles/latest.txt")
          already_done = (
              latest_file.exists()
              and latest_file.read_text().strip() == version
              and os.environ.get("FORCE_SYNC", "false").lower() != "true"
          )
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"already_synced={'true' if already_done else 'false'}\n")

          if already_done:
              print(f"Already synced at {version} — will skip download step.")
          EOF

      - name: Download bundles
        if: steps.version_check.outputs.already_synced != 'true'
        run: python3 scripts/sync_bundles.py

      - name: Commit and push new bundles
        if: steps.version_check.outputs.already_synced != 'true'
        run: |
          VERSION="${{ steps.version_check.outputs.version }}"
          PLATFORM="${{ env.SFA_PLATFORM }}"
          MAX_BATCH_BYTES=$(( 150 * 1024 * 1024 ))

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 1048576000

          mapfile -t NEW_FILES < <(git ls-files --others --modified --exclude-standard bundles/)
          TOTAL=${#NEW_FILES[@]}
          if [ "$TOTAL" -eq 0 ]; then
            echo "No new files to commit."
            exit 0
          fi
          echo "Total new files: $TOTAL"

          push_with_retry() {
            for attempt in 1 2 3; do
              git push origin main && return 0
              echo "  Push attempt $attempt failed, retrying in 15s…"
              sleep 15
            done
            echo "ERROR: push failed after 3 attempts" >&2
            return 1
          }

          BATCH_NUM=0
          CHUNK=()
          CHUNK_BYTES=0

          flush() {
            [ "${#CHUNK[@]}" -eq 0 ] && return 0
            BATCH_NUM=$(( BATCH_NUM + 1 ))
            git add "${CHUNK[@]}"
            git commit -q -m "sync: ${VERSION} [${PLATFORM}] batch ${BATCH_NUM} (${#CHUNK[@]} files)"
            echo "Pushing batch ${BATCH_NUM} (${#CHUNK[@]} files, ~$(( CHUNK_BYTES / 1024 / 1024 ))MB)…"
            push_with_retry || exit 1
            CHUNK=()
            CHUNK_BYTES=0
          }

          for f in "${NEW_FILES[@]}"; do
            SIZE=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$CHUNK_BYTES" -gt 0 ] && [ $(( CHUNK_BYTES + SIZE )) -gt "$MAX_BATCH_BYTES" ]; then
              flush
            fi
            CHUNK+=("$f")
            CHUNK_BYTES=$(( CHUNK_BYTES + SIZE ))
          done
          flush

          echo "All $TOTAL files committed and pushed in $BATCH_NUM batches."

      - name: Summary
        run: |
          VERSION="${{ steps.version_check.outputs.version }}"
          SYNCED="${{ steps.version_check.outputs.already_synced }}"
          COUNT=$(find bundles/${VERSION} -name '*.bin' 2>/dev/null | wc -l || echo 0)

          echo "## Bundle Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo ""                       >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"        >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"        >> $GITHUB_STEP_SUMMARY
          echo "| Version  | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ env.SFA_PLATFORM }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundles  | ${COUNT} |"        >> $GITHUB_STEP_SUMMARY
          echo "| Skipped  | ${SYNCED} |"       >> $GITHUB_STEP_SUMMARY