name: Extract Animations

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Bundle version folder to read raw .bin files from (e.g. 1.9.80.21.26220-prod)"
        required: true

permissions:
  contents: write

env:
  SHARD_TOTAL: 4

jobs:
  extract-shard:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify raw bundle version folder exists
        run: |
          INPUT_DIR="bundles/${{ github.event.inputs.version }}"
          if [ ! -d "$INPUT_DIR" ]; then
            echo "ERROR: $INPUT_DIR does not exist in this repo" >&2
            exit 1
          fi
          echo "Found $INPUT_DIR with $(find "$INPUT_DIR" -maxdepth 1 -name '*.bin' | wc -l) .bin files"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install UnityPy zstandard --break-system-packages

      - name: Extract this shard's animations
        env:
          INPUT_DIR: bundles/${{ github.event.inputs.version }}
          OUTPUT_DIR: shard_output/shard_${{ matrix.shard }}
          SHARD_INDEX: ${{ matrix.shard }}
        run: python3 scripts/extract_animations.py

      - name: Upload shard output as artifact
        uses: actions/upload-artifact@v4
        with:
          name: shard-${{ matrix.shard }}
          path: shard_output/shard_${{ matrix.shard }}/
          if-no-files-found: ignore
          retention-days: 1

  merge:
    needs: extract-shard
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      VERSION: ${{ github.event.inputs.version }}
      OUTPUT_DIR: bundles/assets

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all shard artifacts
        uses: actions/download-artifact@v4
        with:
          path: shard_downloads
          pattern: shard-*

      - name: Flatten shards into bundles/assets, resolving name collisions
        run: |
          rm -rf "${OUTPUT_DIR}"
          mkdir -p "${OUTPUT_DIR}"

          COLLISIONS=0
          for shard_dir in shard_downloads/shard-*/; do
            [ -d "$shard_dir" ] || continue
            for f in "$shard_dir"*.bin; do
              [ -e "$f" ] || continue
              base=$(basename "$f")
              dest="${OUTPUT_DIR}/${base}"
              if [ -e "$dest" ]; then
                COLLISIONS=$((COLLISIONS + 1))
                stem="${base%.bin}"
                dest="${OUTPUT_DIR}/${stem}_$(md5sum "$f" | cut -c1-8).bin"
              fi
              cp "$f" "$dest"
            done
          done

          echo "Flattened $(find "${OUTPUT_DIR}" -type f | wc -l) file(s) into ${OUTPUT_DIR}"
          if [ "$COLLISIONS" -gt 0 ]; then
            echo "Resolved $COLLISIONS filename collision(s) across shards by appending a content hash."
          fi

      - name: Commit and push animations
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 1048576000

          git add -A -- "${OUTPUT_DIR}"
          git status --short -- "${OUTPUT_DIR}"

          if git diff --cached --quiet -- "${OUTPUT_DIR}"; then
            echo "No change in ${OUTPUT_DIR}, nothing to commit."
            exit 0
          fi

          TOTAL=$(git diff --cached --name-only -- "${OUTPUT_DIR}" | wc -l)
          git commit -q -m "extract: animations for ${VERSION} (${TOTAL} files changed)"

          for attempt in 1 2 3; do
            git push origin main && break
            echo "  Push attempt $attempt failed, retrying in 15s…"
            sleep 15
            if [ "$attempt" -eq 3 ]; then
              echo "ERROR: push failed after 3 attempts" >&2
              exit 1
            fi
          done

      - name: Summary
        run: |
          COUNT=$(find "${OUTPUT_DIR}" -type f 2>/dev/null | wc -l || echo 0)
          echo "## Animation Extraction Summary" >> $GITHUB_STEP_SUMMARY
          echo ""                                >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"                  >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"                  >> $GITHUB_STEP_SUMMARY
          echo "| Source version | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Animations     | ${COUNT} |"        >> $GITHUB_STEP_SUMMARY
          echo "| Shards         | ${{ env.SHARD_TOTAL }} |" >> $GITHUB_STEP_SUMMARY
