name: Sync SFA Bundles

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform (Android / iOS / StandaloneWindows)"
        required: false
        default: "Android"
      force:
        description: "Force re-upload even if version unchanged (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    env:
      SFA_PLATFORM: ${{ github.event.inputs.platform || 'Android' }}
      FORCE_SYNC:   ${{ github.event.inputs.force    || 'false' }}
      GITHUB_REPO:  ${{ github.repository }}
      GITHUB_BRANCH: main
      BATCH_SIZE:   250
      WORKERS:      16

    steps:
      # Only check out scripts/ — we never touch the bundle files locally
      - name: Checkout (scripts only)
        uses: actions/checkout@v4
        with:
          sparse-checkout: scripts
          sparse-checkout-cone-mode: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # All work happens via GitHub API — no local git needed
      - name: Download bundles and commit via API
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/sync_bundles.py

      - name: Summary
        if: always()
        run: |
          echo "## Bundle Sync" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ env.SFA_PLATFORM }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Force    | \`${{ env.FORCE_SYNC }}\` |" >> $GITHUB_STEP_SUMMARY
