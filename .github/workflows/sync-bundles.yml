name: Sync SFA Bundles

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform (Android / iOS / StandaloneWindows)"
        required: false
        default: "Android"
      force:
        description: "Force re-download even if version unchanged (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

env:
  SFA_PLATFORM: ${{ github.event.inputs.platform || 'Android' }}
  FORCE_SYNC:   ${{ github.event.inputs.force    || 'false' }}
  OUT_DIR:      bundles
  WORKERS:      16
  SHARDS:       4

jobs:
  download:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    outputs:
      version: ${{ steps.version_check.outputs.version }}
      already_synced: ${{ steps.version_check.outputs.already_synced }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check latest game version
        id: version_check
        run: |
          python3 - << 'EOF'
          import json, random, urllib.request, os

          rand = random.randint(10000, 99999)
          url = (
            f"https://sfalb.nekki.com/balance"
            f"?w=PROD-AS&fv=1.9.80.20.26181-prod&rand={rand}&p=Android&client_version=1.9.81"
          )
          req = urllib.request.Request(url, headers={"User-Agent": "UnityPlayer/2022.3"})
          with urllib.request.urlopen(req, timeout=15) as r:
              bal = json.loads(r.read())

          version = bal["version"]["cur"]
          print(f"Latest version: {version}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"version={version}\n")

          import pathlib
          latest_file = pathlib.Path("bundles/latest.txt")
          already_done = (
              latest_file.exists()
              and latest_file.read_text().strip() == version
              and os.environ.get("FORCE_SYNC", "false").lower() != "true"
          )
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"already_synced={'true' if already_done else 'false'}\n")

          if already_done:
              print(f"Already synced at {version} — will skip download step.")
          EOF

      - name: Download bundles
        if: steps.version_check.outputs.already_synced != 'true'
        run: python3 scripts/sync_bundles.py

      - name: Split downloaded files into shards
        if: steps.version_check.outputs.already_synced != 'true'
        run: |
          mkdir -p shard_lists
          find bundles -type f -name '*.bin' | sort > all_files.txt
          split -n l/${{ env.SHARDS }} -d --additional-suffix=.txt all_files.txt shard_lists/shard_
          ls -la shard_lists/
          for f in shard_lists/*.txt; do
            echo "$f: $(wc -l < "$f") files"
          done

      - name: Upload bundles + shard lists as artifact
        if: steps.version_check.outputs.already_synced != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: bundle-payload
          path: |
            bundles/
            shard_lists/
          retention-days: 1

  push-shard:
    needs: download
    if: needs.download.outputs.already_synced != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: bundle-payload
          path: payload

      - name: Create branch and copy this shard's files
        run: |
          VERSION="${{ needs.download.outputs.version }}"
          SHARD_NUM=${{ matrix.shard }}
          BRANCH="sync-shard-${SHARD_NUM}-${{ github.run_id }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 1048576000
          git config pack.threads 0

          git checkout -b "$BRANCH"

          SHARD_LIST=$(printf "payload/shard_lists/shard_%02d.txt" "$SHARD_NUM")
          if [ ! -s "$SHARD_LIST" ]; then
            echo "Shard $SHARD_NUM is empty, nothing to push."
            exit 0
          fi

          mkdir -p bundles
          while IFS= read -r f; do
            rel="${f#bundles/}"
            mkdir -p "bundles/$(dirname "$rel")"
            cp "payload/$f" "bundles/$rel"
          done < "$SHARD_LIST"

          if [ "$SHARD_NUM" -eq 0 ] && [ -f "payload/bundles/latest.txt" ]; then
            cp payload/bundles/latest.txt bundles/latest.txt
          fi

          git add bundles/
          COUNT=$(wc -l < "$SHARD_LIST")
          git commit -q -m "sync: ${VERSION} shard ${SHARD_NUM} (${COUNT} files)" || echo "nothing to commit"
          git push origin "$BRANCH"

  merge:
    needs: [download, push-shard]
    if: always() && needs.download.outputs.already_synced != 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge shard branches into main
        run: |
          VERSION="${{ needs.download.outputs.version }}"
          PLATFORM="${{ env.SFA_PLATFORM }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config http.postBuffer 1048576000

          git checkout main
          git pull origin main

          for SHARD_NUM in 0 1 2 3; do
            BRANCH="sync-shard-${SHARD_NUM}-${{ github.run_id }}"
            if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
              echo "Merging $BRANCH…"
              git fetch origin "$BRANCH"
              git merge --no-edit "origin/$BRANCH" -m "merge: ${VERSION} [${PLATFORM}] shard ${SHARD_NUM}"
            else
              echo "$BRANCH does not exist (empty shard), skipping."
            fi
          done

          git push origin main

      - name: Delete shard branches
        if: always()
        run: |
          for SHARD_NUM in 0 1 2 3; do
            BRANCH="sync-shard-${SHARD_NUM}-${{ github.run_id }}"
            git push origin --delete "$BRANCH" 2>/dev/null || echo "$BRANCH already gone"
          done

      - name: Summary
        run: |
          VERSION="${{ needs.download.outputs.version }}"
          COUNT=$(find bundles/${VERSION} -name '*.bin' 2>/dev/null | wc -l || echo 0)

          echo "## Bundle Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo ""                       >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |"        >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|"        >> $GITHUB_STEP_SUMMARY
          echo "| Version  | \`${VERSION}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | \`${{ env.SFA_PLATFORM }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Bundles  | ${COUNT} |"        >> $GITHUB_STEP_SUMMARY
          echo "| Shards   | ${{ env.SHARDS }} |" >> $GITHUB_STEP_SUMMARY